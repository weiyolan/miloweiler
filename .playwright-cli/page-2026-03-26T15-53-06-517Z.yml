        - heading "Come Back (movie)" [level=1] [ref=e17]
        - paragraph [ref=e19]: "\"Comeback\" is a 2025 Belgian film written and directed by brothers Jan and Raf Roosens, marking their feature film debut. The lead roles are played by Veerle Baetens, Billie-Louise Vlegels, and Zwangere Guy. Fourteen-year-old Ava has lived with her father since her parents’ divorce. Her mother, Naomi, a former successful techno DJ, suddenly reappears after years away, determined to make a comeback. She drags Ava into the nightclub scene, ignoring the disapproval of Ava’s father, Dominique, who left that world behind. As Naomi struggles to reclaim her place, Ava is pulled in too. She tries to adapt but soon finds herself torn between her parents' opposing worlds, fighting to hold on to her own identity."
